<!DOCTYPE html>
<html>
<head>
<title>Mini Wolves</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
}

#chat{
height:200px;
overflow:auto;
border:1px solid #555;
padding:10px;
}
</style>
</head>

<body>

<h1>Mini Wolves V3</h1>

<input id="name" placeholder="Name">
<input id="room" placeholder="Room Code">

<button onclick="joinRoom()">
Join Room
</button>

<div id="hostControls" style="display:none;">

    <button onclick="startGame()">
        Start Game
    </button>

    <button onclick="nextPhase()">
        Next Phase
    </button>

</div>

<h2 id="status"></h2>
<h2 id="phase">Lobby</h2>
<h2 id="role"></h2>

<h3>Players</h3>
<div id="players"></div>

<h3>Vote</h3>

<select id="voteTarget"></select>

<button onclick="votePlayer()">
Vote Out
</button>

<h3>Chat</h3>
<div id="chat"></div>

<input id="message">

<button onclick="sendMessage()">
Send
</button>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="app.js"></script>

</body>
</html>
